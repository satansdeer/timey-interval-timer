<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#008080" />
    <title>Timey</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="program-window" aria-label="Timey timer studio">
        <header class="window-titlebar">
          <div class="window-title">
            <span class="window-icon" aria-hidden="true">TY</span>
            <h1>Timey - Timer Studio</h1>
          </div>
        </header>

        <div class="menu-bar" aria-label="Application actions">
          <button class="menu-button" id="installButton" hidden type="button">Install...</button>
          <button class="menu-button" id="resetDataButton" type="button">Reset</button>
          <button class="menu-button" id="shareWorkoutButton" type="button">Share</button>
        </div>

        <div class="window-client">
          <div class="tab-strip" role="tablist" aria-label="Timey views">
            <button
              class="tab-button active"
              id="playerTabButton"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="playerPanel"
              data-tab-target="playerPanel"
            >
              Timer Player
            </button>
            <button
              class="tab-button"
              id="sequenceTabButton"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="sequencePanel"
              data-tab-target="sequencePanel"
              tabindex="-1"
            >
              Sequence Setup
            </button>
          </div>

          <div class="tab-frame">
            <section
              class="timer-surface tab-panel"
              id="playerPanel"
              role="tabpanel"
              aria-labelledby="playerTabButton"
              data-tab-panel
            >
              <div class="timer-meta">
                <div>
                  <span class="eyebrow">Now</span>
                  <div class="current-title" id="currentTitle">Ready</div>
                </div>
                <div class="next-block">
                  <span class="eyebrow">Next</span>
                  <div id="nextTitle">None</div>
                </div>
              </div>

              <div class="timer-dial" id="timerDial" role="timer" aria-live="polite">
                <div class="segmented-ring" id="segmentedRing" aria-hidden="true"></div>
                <div class="timer-readout">
                  <div class="timer-pretime" id="timerElapsed">Elapsed 00:00</div>
                  <div class="timer-time" id="timerTime">00:00</div>
                  <div class="timer-subtime" id="timerSubtime">00:00 total</div>
                </div>
              </div>

              <div class="player-controls" aria-label="Playback controls">
                <button
                  class="control-button secondary"
                  id="previousButton"
                  type="button"
                  aria-label="Previous interval"
                  title="Previous interval"
                >
                  <svg class="control-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="m11 17-5-5 5-5" />
                    <path d="m18 17-5-5 5-5" />
                  </svg>
                  <span class="sr-only">Back</span>
                </button>
                <button
                  class="control-button primary"
                  id="startPauseButton"
                  type="button"
                  data-control-state="play"
                  aria-label="Start"
                  title="Start"
                >
                  <svg class="control-icon state-icon icon-play" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="m8 5 11 7-11 7Z" />
                  </svg>
                  <svg class="control-icon state-icon icon-pause" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M8 5v14" />
                    <path d="M16 5v14" />
                  </svg>
                  <svg class="control-icon state-icon icon-restart" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M3 12a9 9 0 1 0 3-6.7" />
                    <path d="M3 3v6h6" />
                  </svg>
                  <span class="sr-only">Start</span>
                </button>
                <button
                  class="control-button secondary"
                  id="nextButton"
                  type="button"
                  aria-label="Next interval"
                  title="Next interval"
                >
                  <svg class="control-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="m13 17 5-5-5-5" />
                    <path d="m6 17 5-5-5-5" />
                  </svg>
                  <span class="sr-only">Next</span>
                </button>
                <button
                  class="control-button secondary"
                  id="stopButton"
                  type="button"
                  aria-label="Stop"
                  title="Stop"
                >
                  <svg class="control-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M7 7h10v10H7Z" />
                  </svg>
                  <span class="sr-only">Stop</span>
                </button>
              </div>

              <div class="timeline" id="timeline" aria-label="Interval timeline"></div>
            </section>

            <section
              class="builder-surface tab-panel"
              id="sequencePanel"
              role="tabpanel"
              aria-labelledby="sequenceTabButton"
              data-tab-panel
              hidden
            >
              <div class="section-heading">
                <div>
                  <span class="eyebrow">Sequence</span>
                  <h2 id="sequenceSummary">0 intervals</h2>
                </div>
                <div class="sequence-actions" aria-label="Sequence commands">
                  <button class="solid-button" id="addIntervalButton" type="button">Add...</button>
                  <button class="mini-button" data-selected-action="up" type="button">Move Up</button>
                  <button class="mini-button" data-selected-action="down" type="button">Move Down</button>
                  <button class="mini-button" data-selected-action="duplicate" type="button">Duplicate</button>
                  <button class="mini-button" data-selected-action="delete" type="button">Delete</button>
                </div>
              </div>
              <div class="sequence-layout">
                <div class="interval-list" id="intervalList" aria-label="Interval sequence"></div>
                <section
                  class="interval-properties"
                  id="intervalProperties"
                  aria-label="Selected interval properties"
                ></section>
              </div>
            </section>
          </div>
        </div>

        <div class="save-state sr-only" id="saveState" aria-live="polite">Saved locally</div>
      </main>

      <div class="assistant-widget" id="assistantWidget">
        <div class="assistant-status sr-only" id="assistantStatus" aria-live="polite">Tiny LLM</div>
        <aside class="assistant-bubble" id="assistantPopover" aria-label="Timer composer">
          <button
            class="assistant-close-button"
            id="assistantCloseButton"
            type="button"
            aria-label="Close Timmy"
            title="Close"
          >
            <svg class="control-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
            <span class="sr-only">Close</span>
          </button>

          <div class="assistant-bubble-copy" id="assistantBubbleText" aria-live="polite">
            Ask Timmy to set up your timers.
          </div>
          <div class="assistant-thinking" id="assistantThinking" hidden aria-live="polite">
            <div class="sr-only">Timmy is thinking</div>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </div>

          <form class="assistant-form" id="assistantForm">
            <label class="sr-only" for="assistantInput">Describe interval timers</label>
            <textarea
              id="assistantInput"
              rows="1"
              placeholder="8 min warmup, 8 x 1 min hard / 1 min rest..."
            ></textarea>
            <div class="assistant-actions">
              <button class="assistant-copy-button" id="copyConversationButton" type="button">
                Copy log
              </button>
              <button class="solid-button" id="assistantSubmit" type="submit">Send</button>
            </div>
          </form>
        </aside>

        <button
          class="assistant-launcher"
          id="assistantToggleButton"
          type="button"
          aria-controls="assistantPopover"
          aria-expanded="true"
          aria-label="Focus Timmy timer assistant"
          title="Timmy"
        >
          <span class="assistant-launcher-face" aria-hidden="true">TY</span>
        </button>
      </div>
    </div>

    <div class="modal-backdrop" id="modelModal" hidden>
      <section
        class="model-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modelModalTitle"
        aria-describedby="modelModalText"
      >
        <div>
          <span class="eyebrow">Tiny LLM</span>
          <h2 id="modelModalTitle">Make Timmy smarter?</h2>
        </div>
        <p id="modelModalText">
          Load the local assistant model for better workout edits. It runs on this device.
        </p>
        <div class="model-load-panel" id="modelLoadPanel" hidden>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="modelProgressFill"></div>
          </div>
          <div class="model-modal-status" id="modelModalStatus">Loading...</div>
        </div>
        <div class="model-modal-actions">
          <button class="ghost-button" id="useFallbackButton" type="button">Use Fallback</button>
          <button class="solid-button" id="loadModelButton" type="button">Load Model</button>
        </div>
      </section>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
